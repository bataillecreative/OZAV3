<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
.eye{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:var(--space-3)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-3)}
.tile{aspect-ratio:1.3/1;background:var(--neutral-200);border:1px solid var(--neutral-400);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;padding:8px;text-align:center}
.tile .n{font-family:var(--font-mono);font-size:10.5px;color:var(--text-primary)}
.tile .v{font-family:var(--font-mono);font-size:9px;color:var(--text-tertiary)}
.r0{border-radius:0}.r1{border-radius:3px}.r2{border-radius:6px}.r3{border-radius:10px}
</style></head><body><div class="card">
<div class="eye">Échelle stricte — pas plus arrondi que 10 (pill 999 réservé aux statuts)</div>
<div class="grid">
  <div class="tile r0"><div class="n">none</div><div class="v">0px · matrice</div></div>
  <div class="tile r1"><div class="n">--radius-sm</div><div class="v">3px · swatches</div></div>
  <div class="tile r2"><div class="n">--radius-md</div><div class="v">6px · btn / input</div></div>
  <div class="tile r3"><div class="n">--radius-lg</div><div class="v">10px · cards</div></div>
</div>
</div></body></html>
