<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Hopper hommages</title>
<link rel="stylesheet" href="_card.css">
<style>
.eye{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:var(--space-3)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-3)}
.cardx{display:flex;flex-direction:column;gap:6px}
.canvas{aspect-ratio:5/4;background:var(--neutral-900);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow-md)}
.canvas img{width:100%;height:100%;object-fit:cover;display:block}
.t{font-family:var(--font-display);font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-primary)}
.m{font-family:var(--font-body);font-style:italic;font-size:10.5px;color:var(--text-tertiary)}
</style></head><body><div class="card">
<div class="eye">Trois tableaux · hommages chromatiques composés à la main · verrouillés</div>
<div class="grid">
  <div class="cardx"><div class="canvas"><img src="../assets/hopper/04_hopper_gas_1940.svg" alt="Gas"></div><div class="t">Gas</div><div class="m">1940 · MoMA</div></div>
  <div class="cardx"><div class="canvas"><img src="../assets/hopper/04_hopper_western_motel_1957.svg" alt="Western Motel"></div><div class="t">Western Motel</div><div class="m">1957 · Yale</div></div>
  <div class="cardx"><div class="canvas"><img src="../assets/hopper/04_hopper_nighthawks_1942.svg" alt="Nighthawks"></div><div class="t">Nighthawks</div><div class="m">1942 · AIC</div></div>
</div>
</div></body></html>
