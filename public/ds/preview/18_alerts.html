<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Alerts</title>
<link rel="stylesheet" href="_card.css">
<style>
.eye{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:var(--space-3)}
.alert{padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);border-left:3px solid;font-family:var(--font-body);font-size:12.5px;line-height:1.5;margin-bottom:var(--space-3)}
.alert:last-child{margin-bottom:0}
.alert strong{font-weight:500}
.a-info{background:var(--water-100);border-left-color:var(--water-400);color:var(--water-700)}
.a-action{background:var(--signal-100);border-left-color:var(--signal-500);color:var(--signal-700)}
</style></head><body><div class="card">
<div class="eye">Info (eau) · Action (signal-500 · web only)</div>
<div class="alert a-info"><strong>Note —</strong> 23 enseignes recensées dans cette zone, mise à jour mars 2026.</div>
<div class="alert a-action"><strong>Action requise —</strong> 3 fiches incomplètes nécessitent votre validation.</div>
</div></body></html>
