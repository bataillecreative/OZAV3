<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Supreme — body</title>
<link rel="stylesheet" href="_card.css">
<style>
.eye{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:var(--space-3)}
.row{display:grid;grid-template-columns:90px 1fr;gap:var(--space-3);align-items:baseline;padding:var(--space-2) 0;border-bottom:1px solid var(--border-subtle)}
.row:last-child{border-bottom:0}
.lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)}
.s{font-family:var(--font-body);font-size:18px;color:var(--text-primary);letter-spacing:-0.01em;line-height:1.25}
.w300{font-weight:300}.w400{font-weight:400}.w500{font-weight:500}.w700{font-weight:700}
.it{font-style:italic;font-weight:300;color:var(--text-secondary)}
</style></head><body><div class="card">
<div class="eye">Supreme · body · 300 / 400 / 500 / 700 + italic · Fontshare</div>
<div class="row"><span class="lbl">Light · 300</span><span class="s w300">Captions, méta, citations.</span></div>
<div class="row"><span class="lbl">Regular · 400</span><span class="s w400">Texte courant, paragraphes.</span></div>
<div class="row"><span class="lbl">Medium · 500</span><span class="s w500">Labels, boutons, accents.</span></div>
<div class="row"><span class="lbl">Bold · 700</span><span class="s w700">Mise en évidence ponctuelle.</span></div>
<div class="row"><span class="lbl">Italic · 300i</span><span class="s it">« There's nothing out there. »</span></div>
</div></body></html>
