<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Neutral</title>
<link rel="stylesheet" href="_card.css">
<style>
/* Display-only lift — lets the neutral-100 swatch detach from the page surface.
   Tokens unchanged; this is paper-white, off-system, used here only for legibility. */
html, body { background: #FAF7EF; }
.card { background: #FAF7EF; }
.swatches{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-2)}
.sw{aspect-ratio:1.6/1;border-radius:var(--radius-sm);border:1px solid rgba(44,40,32,0.08);position:relative;padding:8px}
.sw .step{font-family:var(--font-mono);font-size:9px;letter-spacing:.06em;opacity:.6;position:absolute;top:6px;right:8px}
.sw .hex{font-family:var(--font-mono);font-size:10px;font-weight:500;position:absolute;bottom:6px;left:8px}
.sw .name{font-family:var(--font-body);font-weight:500;font-size:11px;position:absolute;bottom:22px;left:8px}
.sw.l .step,.sw.l .hex,.sw.l .name{color:var(--neutral-900)}
.sw.d .step,.sw.d .hex,.sw.d .name{color:var(--neutral-100)}
.row{margin-top:var(--space-3);font-family:var(--font-body);font-size:11px;color:var(--text-tertiary);line-height:1.5}
</style></head><body><div class="card">
<div class="swatches">
  <div class="sw l" style="background:var(--neutral-100)"><span class="step">100</span><span class="name">Gris perle</span><span class="hex">#F0EBDF</span></div>
  <div class="sw l" style="background:var(--neutral-200)"><span class="step">200</span><span class="name">Gris chaud</span><span class="hex">#D6CFC0</span></div>
  <div class="sw l" style="background:var(--neutral-400)"><span class="step">400</span><span class="name">Gris moyen</span><span class="hex">#A8A097</span></div>
  <div class="sw d" style="background:var(--neutral-900)"><span class="step">900</span><span class="name">Noir chaud</span><span class="hex">#2C2820</span></div>
</div>
<div class="row">Fonds, bâti, contours, texte. <span style="color:var(--text-secondary)">100 utilitaire fond canvas · 900 utilitaire texte.</span></div>
</div></body></html>
