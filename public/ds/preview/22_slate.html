<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Slate / cartouche d'heure</title>
<link rel="stylesheet" href="_card.css">
<style>
.eye{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:var(--space-3)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-3)}
.tile{padding:var(--space-3) var(--space-4);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius-md)}
.h{font-family:var(--font-mono);font-size:10px;font-variant:small-caps;letter-spacing:.16em;color:var(--text-tertiary);margin-bottom:6px;text-transform:uppercase}
.n{font-family:var(--font-display);font-size:18px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-primary)}
</style></head><body><div class="card">
<div class="eye">data-hour::before · top-right de chaque .hour-* · slate de tournage</div>
<div class="grid">
  <div class="tile"><div class="h">05·42 — pre-dawn</div><div class="n">I · Aube</div></div>
  <div class="tile"><div class="h">19·08 — magic hour</div><div class="n">IV · Or</div></div>
  <div class="tile"><div class="h">23·47 — neon</div><div class="n">V · Nuit</div></div>
</div>
</div></body></html>
