<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Tabs</title>
<link rel="stylesheet" href="_card.css">
<style>
.eye{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:var(--space-3)}
.tabs{display:flex;border-bottom:1px solid var(--border-default);margin-bottom:var(--space-3)}
.t{padding:10px 16px;font-family:var(--font-body);font-weight:500;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-tertiary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.t.active{color:var(--text-primary);border-bottom-color:var(--signal-500)}
</style></head><body><div class="card">
<div class="eye">Underline 2px · color signal-500 sur l'actif · all-caps small</div>
<div class="tabs">
  <div class="t active">Carte</div>
  <div class="t">Liste</div>
  <div class="t">Stats</div>
  <div class="t">Export</div>
</div>
</div></body></html>
