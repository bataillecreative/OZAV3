<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Wordmark</title>
<link rel="stylesheet" href="_card.css">
<style>
.eye{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:var(--space-3)}
.full{font-family:var(--font-display);font-size:44px;line-height:1.05;letter-spacing:.005em;text-transform:uppercase;color:var(--text-primary)}
.row{display:flex;align-items:flex-start;gap:var(--space-5);margin-top:var(--space-4)}
.short{font-family:var(--font-display);font-size:56px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-primary);line-height:1}
.short.neon{color:#D63A6E;text-shadow:0 0 3px currentColor,0 0 8px currentColor,0 0 16px rgba(214,58,110,0.5);background:#251E36;display:inline-block;padding:6px 14px;border-radius:var(--radius-sm)}
.lbl{font-family:var(--font-mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-tertiary);margin-top:6px}
</style></head><body><div class="card">
<div class="eye">Wordmark Anton · sigle court · variante néon</div>
<div class="full">Open Zone Acte.</div>
<div class="row">
  <div><div class="short">OZA</div><div class="lbl">Romain</div></div>
  <div><div class="short neon">OZA</div><div class="lbl">Néon · sur plum</div></div>
</div>
</div></body></html>
