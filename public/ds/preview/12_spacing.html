<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="_card.css">
<style>
.eye{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:var(--space-3)}
.row{display:grid;grid-template-columns:90px 1fr;gap:var(--space-3);align-items:center;padding:5px 0;border-bottom:1px solid var(--border-subtle)}
.row:last-child{border-bottom:0}
.lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)}
.bar{height:12px;background:var(--network-500);border-radius:var(--radius-sm)}
</style></head><body><div class="card">
<div class="eye">--space-1 → --space-9 · base 4 · 4 · 8 · 12 · 16 · 24 · 32 · 48 · 64 · 80</div>
<div class="row"><span class="lbl">space-1 · 4</span><div class="bar" style="width:4px"></div></div>
<div class="row"><span class="lbl">space-2 · 8</span><div class="bar" style="width:8px"></div></div>
<div class="row"><span class="lbl">space-3 · 12</span><div class="bar" style="width:12px"></div></div>
<div class="row"><span class="lbl">space-4 · 16</span><div class="bar" style="width:16px"></div></div>
<div class="row"><span class="lbl">space-5 · 24</span><div class="bar" style="width:24px"></div></div>
<div class="row"><span class="lbl">space-6 · 32</span><div class="bar" style="width:32px"></div></div>
<div class="row"><span class="lbl">space-7 · 48</span><div class="bar" style="width:48px"></div></div>
<div class="row"><span class="lbl">space-8 · 64</span><div class="bar" style="width:64px"></div></div>
<div class="row"><span class="lbl">space-9 · 80</span><div class="bar" style="width:80px"></div></div>
</div></body></html>
