<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Signal</title>
<link rel="stylesheet" href="_card.css">
<style>
.swatches{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-2)}
.sw{aspect-ratio:1.6/1;border-radius:var(--radius-sm);border:1px solid rgba(44,40,32,0.06);position:relative;padding:8px}
.sw .step{font-family:var(--font-mono);font-size:9px;letter-spacing:.06em;opacity:.6;position:absolute;top:6px;right:8px}
.sw .hex{font-family:var(--font-mono);font-size:10px;font-weight:500;position:absolute;bottom:6px;left:8px}
.sw .name{font-family:var(--font-body);font-weight:500;font-size:10.5px;position:absolute;bottom:22px;left:8px}
.sw.l .step,.sw.l .hex,.sw.l .name{color:var(--neutral-900)}
.sw.d .step,.sw.d .hex,.sw.d .name{color:var(--neutral-100)}
.row{margin-top:var(--space-3);font-family:var(--font-body);font-size:11px;color:var(--text-tertiary);line-height:1.5}
.mono{color:var(--signal-500);font-weight:500;font-style:italic}
</style></head><body><div class="card">
<div class="swatches">
  <div class="sw l" style="background:var(--signal-100)"><span class="step">100</span><span class="name">Saumon</span><span class="hex">#F5DDD7</span></div>
  <div class="sw d" style="background:var(--signal-400)"><span class="step">400</span><span class="name">Magenta de Jane</span><span class="hex">#D63A6E</span></div>
  <div class="sw d" style="background:var(--signal-500)"><span class="step">500</span><span class="name">Rouge Travis</span><span class="hex">#B5483A</span></div>
  <div class="sw d" style="background:var(--signal-700)"><span class="step">700</span><span class="name">Brique aubergine</span><span class="hex">#5A1F2E</span></div>
</div>
<div class="row"><span class="mono">Signal bicéphale.</span> Magenta de Jane sur la carte. Rouge Travis sur le web. Jamais l'inverse.</div>
</div></body></html>
