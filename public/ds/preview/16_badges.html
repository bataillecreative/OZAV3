<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="_card.css">
<style>
.eye{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:var(--space-3)}
.row{display:flex;flex-wrap:wrap;gap:var(--space-2);align-items:center}
.b{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:var(--radius-pill);font-family:var(--font-body);font-weight:500;font-size:11px}
.b-zone{background:var(--network-300);color:var(--network-700)}
.b-water{background:var(--water-100);color:var(--water-700)}
.b-built{background:var(--warm-300);color:var(--warm-700)}
.b-signal{background:var(--signal-100);color:var(--signal-700)}
.b-vege{background:var(--green-300);color:var(--green-700)}
.b-active{background:var(--neutral-200);color:var(--neutral-900)}
</style></head><body><div class="card">
<div class="eye">6 familles sémantiques — pill 999 · une couleur par usage</div>
<div class="row">
  <span class="b b-active">● Actif</span>
  <span class="b b-zone">ZAC commerciale</span>
  <span class="b b-water">Plan d'eau</span>
  <span class="b b-built">Projet</span>
  <span class="b b-signal">POI majeur</span>
  <span class="b b-vege">Végétation</span>
</div>
</div></body></html>
