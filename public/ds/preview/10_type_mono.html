<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>JetBrains Mono — data</title>
<link rel="stylesheet" href="_card.css">
<style>
.eye{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:var(--space-3)}
.row{display:grid;grid-template-columns:120px 1fr;gap:var(--space-3);align-items:baseline;padding:var(--space-2) 0;border-bottom:1px solid var(--border-subtle)}
.row:last-child{border-bottom:0}
.lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)}
.m{font-family:var(--font-mono);color:var(--text-primary)}
.slate{font-size:11px;font-variant:small-caps;letter-spacing:.18em;color:var(--text-tertiary);text-transform:uppercase}
.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--signal-500)}
.coord{font-size:13px;letter-spacing:.04em}
.tok{font-size:12px;color:var(--text-primary)}
</style></head><body><div class="card">
<div class="eye">JetBrains Mono · data · 400 / 500 · Google Fonts</div>
<div class="row"><span class="lbl">Slate · 10/sc</span><span class="m slate">05·42 — pre-dawn</span></div>
<div class="row"><span class="lbl">Eyebrow · 11</span><span class="m eyebrow">II · Échelles</span></div>
<div class="row"><span class="lbl">Coord · 13</span><span class="m coord">43.4567° N · 5.4321° E</span></div>
<div class="row"><span class="lbl">Token · 12</span><span class="m tok">--network-500 / #8C7B96</span></div>
<div class="row"><span class="lbl">Mesure · 13</span><span class="m coord">152 ha · 23 enseignes</span></div>
</div></body></html>
