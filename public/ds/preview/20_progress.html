<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><title>Data viz</title>
<link rel="stylesheet" href="_card.css">
<style>
.eye{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-tertiary);margin-bottom:var(--space-3)}
.r{margin-bottom:var(--space-3)}
.r:last-child{margin-bottom:0}
.row{display:flex;justify-content:space-between;align-items:baseline;font-family:var(--font-body);font-size:12px;margin-bottom:4px;color:var(--text-secondary)}
.row strong{font-family:var(--font-display);font-weight:400;font-size:18px;letter-spacing:.02em;color:var(--text-primary)}
.bar{height:8px;background:var(--neutral-200);border-radius:var(--radius-pill);overflow:hidden}
.fill{height:100%;border-radius:var(--radius-pill)}
</style></head><body><div class="card">
<div class="eye">Couleurs sémantiques par catégorie · Anton pour les chiffres</div>
<div class="r"><div class="row"><span>Surface bâtie</span><strong>68%</strong></div><div class="bar"><div class="fill" style="width:68%;background:var(--network-500)"></div></div></div>
<div class="r"><div class="row"><span>Sols perméables</span><strong>23%</strong></div><div class="bar"><div class="fill" style="width:23%;background:var(--green-500)"></div></div></div>
<div class="r"><div class="row"><span>Eau</span><strong>9%</strong></div><div class="bar"><div class="fill" style="width:9%;background:var(--water-400)"></div></div></div>
</div></body></html>
