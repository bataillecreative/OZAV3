<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" width="1600" height="1200" font-family="Supreme, system-ui, sans-serif">
  
  <rect width="1600" height="1200" fill="#F0EBDF"></rect>

  
  <text x="80" y="100" font-family="Anton, sans-serif" font-size="56" fill="#2C2820" letter-spacing="2">TYPOGRAPHIE.</text>
  <text x="80" y="135" font-family="JetBrains Mono, monospace" font-size="13" fill="#2C2820" letter-spacing="3" opacity="0.6">TROIS POLICES · ANTON DISPLAY · SUPREME BODY · JETBRAINS MONO DATA</text>
  <line x1="80" y1="160" x2="1520" y2="160" stroke="#A8A097" stroke-width="1"></line>

  
  <text x="80" y="220" font-family="JetBrains Mono, monospace" font-size="12" fill="#2C2820" letter-spacing="3" opacity="0.6">ANTON · DISPLAY · UNE GRAISSE · ALL-CAPS</text>
  <text x="80" y="320" font-family="Anton, sans-serif" font-size="120" fill="#2C2820" letter-spacing="2">OPEN ZONE ACTE.</text>
  <text x="80" y="380" font-family="Anton, sans-serif" font-size="56" fill="#2C2820" letter-spacing="3">CARTOGRAPHIER LA MARGE</text>
  <text x="80" y="425" font-family="Anton, sans-serif" font-size="32" fill="#2C2820" letter-spacing="4">ZAC · HYPERMARCHÉ · RETAIL PARK</text>
  <text x="80" y="455" font-family="Anton, sans-serif" font-size="18" fill="#2C2820" letter-spacing="6" opacity="0.7">CINQ FAMILLES · TROIS PALIERS · UNE EXCEPTION</text>
  <line x1="80" y1="490" x2="1520" y2="490" stroke="#A8A097" stroke-width="0.4" opacity="0.5"></line>

  
  <text x="80" y="540" font-family="JetBrains Mono, monospace" font-size="12" fill="#2C2820" letter-spacing="3" opacity="0.6">SUPREME · BODY · 4 GRAISSES (300/400/500/700) · ITALIQUE</text>
  <text x="80" y="600" font-family="Supreme, sans-serif" font-weight="300" font-size="36" fill="#2C2820">Une palette qui se lit comme un paysage —</text>
  <text x="80" y="650" font-family="Supreme, sans-serif" font-weight="400" font-size="22" fill="#2C2820">les sols perméables, l&#39;eau cendrée, le sodium d&#39;enseigne, le magenta qui marque la halte.</text>
  <text x="80" y="690" font-family="Supreme, sans-serif" font-weight="500" font-size="18" fill="#2C2820">Le système repose sur 20 couleurs organisées en cinq familles fonctionnelles + une exception assumée.</text>
  <text x="80" y="725" font-family="Supreme, sans-serif" font-weight="700" font-size="16" fill="#2C2820" letter-spacing="0.5">LE SIGNAL EST BICÉPHALE — MAGENTA SUR LA CARTE, ROUGE SUR LE WEB.</text>
  <text x="80" y="760" font-family="Supreme, sans-serif" font-weight="400" font-style="italic" font-size="16" fill="#2C2820" opacity="0.85">« There&#39;s nothing out there. There&#39;s no language, there&#39;s no streets. »</text>
  <line x1="80" y1="800" x2="1520" y2="800" stroke="#A8A097" stroke-width="0.4" opacity="0.5"></line>

  
  <text x="80" y="850" font-family="JetBrains Mono, monospace" font-size="12" fill="#2C2820" letter-spacing="3" opacity="0.6">JETBRAINS MONO · DATA · MÉTADONNÉES · CARTOUCHES</text>
  <text x="80" y="910" font-family="JetBrains Mono, monospace" font-weight="400" font-size="32" fill="#2C2820" letter-spacing="2">05·42 — pre-dawn</text>
  <text x="80" y="955" font-family="JetBrains Mono, monospace" font-weight="500" font-size="20" fill="#2C2820" letter-spacing="3">--signal-500 · #B5483A · CTA</text>
  <text x="80" y="990" font-family="JetBrains Mono, monospace" font-weight="400" font-size="14" fill="#2C2820" letter-spacing="2.5">N 96 · A 7 · D 296 · ROUTE DE CRESSY</text>
  <text x="80" y="1018" font-family="JetBrains Mono, monospace" font-weight="400" font-size="13" fill="#2C2820" letter-spacing="2" opacity="0.7">[ 43°44&#39;12&#34;N · 04°37&#39;08&#34;E ]</text>

  
  <g transform="translate(1100,830)">
    <rect width="420" height="220" fill="none" stroke="#A8A097" stroke-width="0.8" stroke-dasharray="4 4"></rect>
    <text x="20" y="38" font-family="JetBrains Mono, monospace" font-size="11" fill="#2C2820" letter-spacing="2.5" opacity="0.6">SLATE DE TOURNAGE — CARTOUCHE D&#39;HEURE</text>
    <rect x="20" y="60" width="380" height="36" fill="none" stroke="#2C2820" stroke-width="0.6"></rect>
    <text x="35" y="84" font-family="JetBrains Mono, monospace" font-size="14" fill="#2C2820" letter-spacing="3">19·08 — magic hour</text>
    <text x="20" y="135" font-family="Supreme, sans-serif" font-style="italic" font-size="14" fill="#2C2820" opacity="0.75">Présent en haut à droite de chaque heure du document — marqueur narratif discret de la « journée qui passe ».</text>
    <text x="20" y="195" font-family="JetBrains Mono, monospace" font-size="10" fill="#2C2820" letter-spacing="2" opacity="0.55">DAWN · MORNING · AFTERNOON · MAGIC · NIGHT · RETURN</text>
  </g>

  
  <line x1="80" y1="1080" x2="1520" y2="1080" stroke="#A8A097" stroke-width="0.6" opacity="0.5"></line>
  <text x="80" y="1115" font-family="JetBrains Mono, monospace" font-size="11" fill="#2C2820" letter-spacing="2.5" opacity="0.7">SOURCES · GOOGLE FONTS (ANTON, JETBRAINS MONO) · FONTSHARE (SUPREME)</text>
  <text x="80" y="1140" font-family="JetBrains Mono, monospace" font-size="11" fill="#2C2820" letter-spacing="2.5" opacity="0.7">RÈGLE · TROIS POLICES, PAS PLUS — AUCUNE NE BOUGE</text>
  <text x="80" y="1165" font-family="JetBrains Mono, monospace" font-size="11" fill="#2C2820" letter-spacing="2.5" opacity="0.7">RÔLE · ANTON DIT, SUPREME RACONTE, JETBRAINS MONO MESURE</text>
</svg>